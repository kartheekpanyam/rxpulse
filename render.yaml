services:
  - type: web
    name: rxpulse-backend
    runtime: python
    plan: individual
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: rxpulse-frontend
    runtime: node
    plan: individual
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l $PORT
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
